services:
  postgres:
    image: postgres:16-alpine
    container_name: mobility_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peopleops
    ports:
      - '5432:5432'
    volumes:
      - peopleops_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d peopleops']
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  peopleops_pg_data:
